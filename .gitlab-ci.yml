stages:
  - linters
  - tests
  - final

flake8:
  allow_failure: true
  stage: linters
  image: python:3.12
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install flake8

  script:
    - echo "Запуск flake8"
    - flake8 .

pylint:
  allow_failure: true
  stage: linters
  image: python:3.12
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install pylint

  script:
    - echo "Запуск pylint"
    - pylint . > pylint-report.txt

  artifacts:
    paths:
      - pylint-report.txt
    when: always
    expire_in: 7 days

ruff:
  allow_failure: true
  stage: linters
  image: python:3.12
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install ruff

  script:
    - echo "Запуск ruff"
    - ruff check .

tests:
  stage: tests
  timeout: 30 minutes
  image: python:3.12
  rules:
    - when: always

  before_script:
    - echo "Установка пакетов"
    - apt-get update -y
    - apt-get install -y --no-install-recommends default-jre-headless nodejs npm chromium
    - npm install -g allure --unsafe-perm=true
    - echo "Установка зависимостей"
    - pip install --upgrade pip
    - pip install -r requirements.txt

  script:
    - |
      set +e
      echo "Запуск тестов с маркером ui"
      pytest -m ui  
      status=$?
      echo "Pytest exit code $status"
      echo "Генерация отчёта"
      allure awesome allure-results --single-file --output allure-report
      exit $status

  artifacts:
    when: always
    paths:
      - allure-results
      - allure-report
    expire_in: 7 days

final_job:
  stage: final
  when: manual
  script:
    - echo "Пайплайн завершён"
